<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constanza - Mis 15</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-bar"></div>
</div>

<!-- SOBRE -->
<div id="envelope">
  <div class="card">
    <div class="cover"></div>

    <div class="content">
      <h1 class="lux">Constanza</h1>
      <p>Mis 15 años</p>
      <button onclick="openEnvelope()">Abrir invitación</button>
    </div>
  </div>
</div>

<!-- MÚSICA -->
<div id="musicChoice">
  <h2>Elegí tu experiencia</h2>
  <button onclick="enter(true)">Con música</button>
  <button onclick="enter(false)">Sin música</button>
</div>

<audio id="audio" loop>
  <source src="media/musica/musica15coti.mp3" type="audio/mpeg">
</audio>

<div id="musicControl" onclick="toggleMusic()">🔊</div>

<canvas id="bg"></canvas>

<!-- APP -->
<div id="app">

<section class="hero">
  <h1 class="lux big">Constanza</h1>
  <p>11 · 07 · 2026</p>
</section>

<section class="reveal">
  <h2>Faltan</h2>
  <div id="countdown"></div>
</section>

<section class="reveal">
  <h2>Lugar</h2>
  <p>Salón A.E.F.I.P.</p>
  <a class="btn" href="https://maps.app.goo.gl/2fHLRixuznUjLptz8" target="_blank">Ver ubicación</a>
</section>

<section class="reveal">
  <h2>Momentos</h2>

  <div class="slider">
    <div class="slides" id="slides">
      <img src="media/foto/coti_seccion1.jpg">
      <img src="media/foto/coti_seccion2.jpg">
      <img src="media/foto/coti_seccion3.jpg">
    </div>
  </div>
</section>

<section class="reveal">
  <a class="btn" href="https://wa.me/549XXXXXXXXXX">Confirmar asistencia</a>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
