<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constanza - Mis 15</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader"></div>

<div id="envelope">
  <div class="card">
    <div class="cover"></div>

    <div class="content">
      <div class="overlay"></div>

      <div class="text">
        <h1>Constanza</h1>
        <p>Mis 15 años</p>
        <button onclick="openEnvelope()">Abrir invitación</button>
      </div>
    </div>
  </div>
</div>

<div id="musicChoice">
  <h2>Elegí tu experiencia</h2>
  <button onclick="enter(true)">Con música</button>
  <button onclick="enter(false)">Sin música</button>
</div>

<audio id="audio" loop>
  <source src="media/musica/musica15coti.mp3">
</audio>

<div id="app">

<section class="hero">
  <h1>Constanza</h1>
  <p>11 · 07 · 2026</p>
</section>

<section class="slider-section">
  <h2>Momentos</h2>

  <div class="slider">
    <div class="track" id="track">
      <img src="media/foto/coti_seccion1.jpg">
      <img src="media/foto/coti_seccion2.jpg">
      <img src="media/foto/coti_seccion3.jpg">
    </div>
  </div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
