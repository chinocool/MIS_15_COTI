<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constanza - Mis 15</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <div class="intro-overlay"></div>

  <div class="intro-content">
    <h1 class="lux">Constanza</h1>

    <div class="buttons">
      <button onclick="enter(true)">Con música</button>
      <button onclick="enter(false)">Sin música</button>
    </div>
  </div>
</div>

<audio id="audio" loop>
  <source src="media/musica/musica15coti.mp3">
</audio>

<canvas id="bg"></canvas>

<div id="app">

<section class="hero">
  <h1 class="lux big">Constanza</h1>

</section>

<section class="section">

<section class="section">

  </a>
</section>

<section class="section">
  <h2>Momentos</h2>

  <div class="slider" id="slider">

      <img src="media/foto/coti_seccion3.jpg">
    </div>
  </div>

</section>

<section class="section gifts">
  <h2>Regalos</h2>

  <div class="gift-box">
    <img src="media/logo/mercadopago.png">
    <p>Si querés hacer un regalo 💛</p>

  </div>
</section>

<section class="section">
  <a class="btn main" href="https://wa.me/549XXXXXXXXXX">
    Confirmar asistencia
  </a>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
