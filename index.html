<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Constanza - Mis 15</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER CINEMATOGRAFICO -->
<div id="loader">
  <div class="loader-text">Cargando experiencia...</div>
</div>

<!-- SOBRE 3D -->
<div id="envelope">
  <div class="env">
    <div class="env-front"></div>
    <div class="env-flap"></div>
    <div class="env-card">
      <h1>Constanza</h1>
      <p>Mis 15</p>
      <button onclick="openEnvelope()">Abrir</button>
    </div>
  </div>
</div>

<!-- ELECCIÓN -->
<div id="musicChoice">
  <h2>Elegí tu experiencia</h2>
  <button onclick="enter(true)">Con música</button>
  <button onclick="enter(false)">Sin música</button>
</div>

<!-- AUDIO REAL -->
<audio id="audio" loop>
  <source src="media/musica/musica15coti.mp3" type="audio/mpeg">
</audio>

<!-- CONTROL -->
<div id="musicControl" onclick="toggleMusic()">🔊</div>

<canvas id="bg"></canvas>

<div id="app">

<section class="section hero">
  <h1 class="lux">Constanza</h1>
  <p>11 · 07 · 2026</p>
</section>

<section class="section reveal">
  <h2>Faltan</h2>
  <div id="countdown"></div>
</section>

<section class="section reveal">
  <h2>Lugar</h2>
  <p>Salón A.E.F.I.P.</p>
  <a class="btn" href="https://maps.app.goo.gl/2fHLRixuznUjLptz8" target="_blank">Ver ubicación</a>
</section>

<section class="section reveal">
  <a class="btn" href="https://wa.me/549XXXXXXXXXX">Confirmar asistencia</a>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
